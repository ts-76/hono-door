name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Show npm version after upgrade
        run: npm --version

      - name: Disable npm workspace detection for release
        run: node scripts/disable-npm-workspaces-for-release.mjs

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run release
